<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">📝 My Notes</span>
    <div>
        <a href="/admin" class="btn btn-warning btn-sm me-2">Admin Panel</a>
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- Add Note Form -->
    <div class="card mb-4">
        <div class="card-body">
            <h5>Add New Note</h5>
            <form method="POST">
                <div class="mb-3">
                    <input type="text" name="content" class="form-control" placeholder="Write your note here..." required>
                </div>
                <button type="submit" class="btn btn-primary">Add Note</button>
            </form>
        </div>
    </div>

    <!-- Notes List -->
    <h4>My Notes</h4>
    {% for note in notes %}
    <div class="card mb-2">
        <div class="card-body d-flex justify-content-between align-items-center">
            <span>{{ note.content }}</span>
            <div>
                <a href="/edit/{{ note.id }}" class="btn btn-sm btn-warning me-1">Edit</a>
                <a href="/delete/{{ note.id }}" class="btn btn-sm btn-danger"
                   onclick="return confirm('Delete this note?')">Delete</a>
            </div>
        </div>
    </div>
    {% else %}
    <p class="text-muted">No notes yet. Add one above!</p>
    {% endfor %}

</div>
</body>
</html>
